# Eldarin Event-based Training Configuration
# RGB + Event stream training with FRED dataset
#
# FRED: https://github.com/francesco-p/FRED
# FPGA-Event-Based-encode: https://github.com/Enotrium/FPGA-Event-Based-encode

model:
  name: "Eldarin-Event"
  visual_backbone: "resnet18"
  pretrained: true
  visual_dim: 1024
  event_dim: 512
  hd_dim: 8192
  fpn_channels: 256

  event:
    height: 480
    width: 640
    representation: "voxel_grid"
    num_bins: 10

  hierarchy:
    num_levels: 4
    level_dims: [2048, 1024, 512, 256]
    use_vsa_binding: true
    dropout: 0.1

  mixing:
    num_iterations: 3
    use_uncertainty_gating: true
    temporal_window: 16
    prior_weight: 0.7

  heads:
    num_classes: 3  # drone, vehicle, other
    detection:
      type: "yolo"
    tracking:
      state_dim: 8
      use_hd_kalman: true

data:
  dataset: "fred"
  modalities: ["rgb", "event"]
  img_size: [640, 640]
  batch_size: 4
  num_workers: 4
  event_window_us: 10000

training:
  epochs: 200
  warmup_epochs: 10
  lr: 0.0005
  weight_decay: 0.0005
  gradient_clip: 10.0
  amp: true
  loss:
    box: 7.5
    cls: 0.5
    obj: 1.0
    track: 2.0
    vsa_consistency: 0.1